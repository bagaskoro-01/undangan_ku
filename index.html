<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan – Bagaskoro & Shafiyah</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --black:#0a0a0a;--black2:#0f0f0f;--black3:#161616;
  --maroon:#6b0f1a;--maroon2:#8b1a2a;--maroon3:#c0392b;
  --rose:#e8a0a0;--white:#fff;--muted:#777;
}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'Raleway',sans-serif;font-weight:300;overflow-x:hidden;}

/* ══════════════════════════════
   BATIK SVG PATTERN (inline, visible)
══════════════════════════════ */
.batik-overlay{
  position:absolute;inset:0;pointer-events:none;z-index:0;
  overflow:hidden;
}

/* ══════════════════════════════
   PAGE TRANSITION
══════════════════════════════ */
#pt{position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:var(--maroon);transform:scaleY(0);transform-origin:bottom;}
#pt.in{animation:ptIn 0.55s cubic-bezier(.77,0,.18,1) forwards;}
#pt.out{animation:ptOut 0.55s cubic-bezier(.77,0,.18,1) forwards;}
@keyframes ptIn{to{transform:scaleY(1);transform-origin:bottom;}}
@keyframes ptOut{from{transform:scaleY(1);transform-origin:top;}to{transform:scaleY(0);transform-origin:top;}}

/* ══════════════════════════════
   COVER
══════════════════════════════ */
#cover{position:fixed;inset:0;z-index:990;background:var(--black);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s,visibility .8s;overflow:hidden;}
#cover.gone{opacity:0;visibility:hidden;pointer-events:none;}
.cv-ring{width:190px;height:190px;border-radius:50%;border:1px solid var(--maroon2);
  display:flex;align-items:center;justify-content:center;margin-bottom:28px;
  position:relative;animation:spin 18s linear infinite;z-index:1;}
.cv-ring::before{content:'';position:absolute;inset:9px;border-radius:50%;
  border:1px solid rgba(139,26,42,.35);}
.cv-inner{animation:spin 18s linear infinite reverse;text-align:center;}
@keyframes spin{to{transform:rotate(360deg);}}
.cv-letter{font-family:'Playfair Display',serif;font-size:40px;font-style:italic;color:var(--maroon3);line-height:1;}
.cv-amp{font-size:22px;color:var(--rose);display:block;margin:3px 0;}
.cv-sub{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;position:relative;z-index:1;}
.cv-to{font-family:'Playfair Display',serif;font-size:19px;color:var(--white);margin-bottom:28px;font-style:italic;position:relative;z-index:1;}
.cv-btn{position:relative;overflow:hidden;background:transparent;border:1px solid var(--maroon2);
  color:var(--rose);padding:13px 42px;font-family:'Raleway',sans-serif;font-size:11px;
  letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:color .3s;z-index:1;}
.cv-btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--maroon),var(--maroon2));
  transform:translateX(-100%);transition:transform .4s ease;}
.cv-btn:hover::before{transform:translateX(0);}
.cv-btn:hover{color:var(--white);}
.cv-btn span{position:relative;z-index:1;}

/* ══════════════════════════════
   SECTIONS — scroll reveal
══════════════════════════════ */
.sec{min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 24px;text-align:center;
  position:relative;overflow:hidden;}

/* Each section gets its own entrance */
.sec.anim-up   {opacity:0;transform:translateY(60px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);}
.sec.anim-left {opacity:0;transform:translateX(-70px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);}
.sec.anim-right{opacity:0;transform:translateX(70px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);}
.sec.anim-zoom {opacity:0;transform:scale(.88);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);}
.sec.anim-flip {opacity:0;transform:perspective(900px) rotateX(18deg) translateY(40px);transition:opacity 1.1s cubic-bezier(.16,1,.3,1),transform 1.1s cubic-bezier(.16,1,.3,1);}
.sec.visible   {opacity:1 !important;transform:none !important;}

/* child stagger — only on non-gallery sections */
.sec.visible .sg{animation:sgIn .65s ease forwards;}
.sg{opacity:0;}
.sg:nth-child(1){animation-delay:.1s;}
.sg:nth-child(2){animation-delay:.25s;}
.sg:nth-child(3){animation-delay:.4s;}
.sg:nth-child(4){animation-delay:.55s;}
@keyframes sgIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* ══════════════════════════════
   DIVIDER
══════════════════════════════ */
.dv{display:flex;align-items:center;gap:14px;margin:22px auto;max-width:280px;}
.dv-l{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--maroon2),transparent);}
.dv-d{width:6px;height:6px;background:var(--maroon3);transform:rotate(45deg);}

/* ══════════════════════════════
   HERO
══════════════════════════════ */
.s-hero{background:linear-gradient(155deg,#0a0a0a 0%,#1a0508 55%,#0a0a0a 100%);}
.s-hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(107,15,26,.28) 0%,transparent 68%);}
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.pt{position:absolute;background:var(--maroon3);border-radius:50%;animation:flt linear infinite;}
@keyframes flt{0%{transform:translateY(110vh);opacity:0;}8%{opacity:.8;}92%{opacity:.4;}100%{transform:translateY(-80px);opacity:0;}}
.h-bar{width:1px;height:72px;background:linear-gradient(to bottom,transparent,var(--maroon2),transparent);margin:0 auto 28px;}
.h-tag{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:var(--maroon3);margin-bottom:14px;position:relative;z-index:1;}
.h-names{font-family:'Playfair Display',serif;font-size:clamp(48px,13vw,96px);
  font-weight:400;color:var(--white);line-height:.95;position:relative;z-index:1;}
.h-amp{font-style:italic;color:var(--maroon3);font-size:.58em;display:block;margin:10px 0;}
.h-date{margin-top:28px;font-size:12px;letter-spacing:5px;text-transform:uppercase;
  color:var(--rose);position:relative;z-index:1;}
.h-line{width:56px;height:1px;background:linear-gradient(to right,transparent,var(--maroon2),transparent);margin:22px auto 0;}
.scroll-hint{position:absolute;bottom:36px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:1;}
.scroll-hint span{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.scroll-ln{width:1px;height:46px;background:linear-gradient(to bottom,var(--maroon3),transparent);animation:blink 2s ease infinite;}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}

/* ══════════════════════════════
   TYPOGRAPHY helpers
══════════════════════════════ */
.s-label{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--maroon3);margin-bottom:10px;position:relative;z-index:1;}
.s-title{font-family:'Playfair Display',serif;font-size:clamp(26px,6vw,42px);
  font-weight:400;margin-bottom:22px;line-height:1.2;position:relative;z-index:1;}
.s-title em{font-style:italic;color:var(--maroon3);}
.s-body{font-size:14px;color:var(--muted);line-height:1.9;max-width:480px;margin:0 auto;position:relative;z-index:1;}

/* ══════════════════════════════
   BISMILLAH
══════════════════════════════ */
.s-bismillah{background:linear-gradient(135deg,#0f0f0f,#150508,#0f0f0f);}
.arabic{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,44px);
  color:var(--maroon3);margin-bottom:14px;position:relative;z-index:1;}
.ayat{font-family:'Playfair Display',serif;font-size:clamp(13px,2.5vw,17px);
  font-style:italic;color:rgba(255,255,255,.55);max-width:460px;line-height:1.9;
  margin:0 auto;position:relative;z-index:1;}
.ayat-src{font-size:11px;color:var(--maroon3);letter-spacing:2px;margin-top:10px;position:relative;z-index:1;}

/* ══════════════════════════════
   COUPLE
══════════════════════════════ */
.s-couple{background:#0f0f0f;}
.couple-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;
  align-items:center;margin:36px auto;max-width:580px;position:relative;z-index:1;}
.c-card{text-align:center;}
.c-photo{width:128px;height:128px;border-radius:50%;border:2px solid var(--maroon2);
  margin:0 auto 14px;overflow:hidden;position:relative;}
.c-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.c-name{font-family:'Playfair Display',serif;font-size:21px;color:var(--white);}
.c-child{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.7;}
.c-child strong{color:var(--rose);}
.c-amp{font-family:'Playfair Display',serif;font-size:58px;font-style:italic;color:var(--maroon3);line-height:1;}

/* ══════════════════════════════
   TIMELINE
══════════════════════════════ */
.s-timeline{background:linear-gradient(135deg,#0a0a0a,#150508,#0a0a0a);}
.timeline{margin:36px auto;position:relative;max-width:580px;z-index:1;}
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,var(--maroon2),transparent);transform:translateX(-50%);}
.tl{display:grid;grid-template-columns:1fr 36px 1fr;gap:14px;margin-bottom:44px;align-items:center;}
.tl:nth-child(odd) .tl-c{text-align:right;}
.tl:nth-child(even) .tl-c{text-align:left;grid-column:3;}
.tl:nth-child(even) .tl-d{grid-column:2;}
.tl-d{width:14px;height:14px;background:var(--maroon);border-radius:50%;margin:0 auto;
  border:2px solid var(--maroon3);box-shadow:0 0 10px rgba(192,57,43,.5);}
.tl-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--maroon3);margin-bottom:5px;}
.tl-name{font-family:'Playfair Display',serif;font-size:19px;color:var(--white);}
.tl-time{font-size:13px;color:var(--rose);margin-top:3px;}
.tl-loc{font-size:12px;color:var(--muted);font-style:italic;margin-top:2px;}

/* ══════════════════════════════
   COUNTDOWN
══════════════════════════════ */
.s-cd{background:#0f0f0f;}
.cd-box{background:linear-gradient(135deg,#150508,#161616);border:1px solid var(--maroon);
  border-radius:14px;padding:44px 28px;margin:28px auto;max-width:540px;
  position:relative;overflow:hidden;z-index:1;}
.cd-box::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(107,15,26,.35) 0%,transparent 60%);}
.cd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;position:relative;}
.cd-i{text-align:center;}
.cd-n{font-family:'Playfair Display',serif;font-size:clamp(34px,8vw,54px);color:var(--maroon3);line-height:1;}
.cd-l{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:7px;}

/* ══════════════════════════════
   GALLERY — FIXED
══════════════════════════════ */
.s-gallery{background:#0a0a0a;padding:80px 0;min-height:auto;}
.g-inner{max-width:860px;margin:0 auto;padding:0 20px;text-align:center;}
.g-hint{font-size:11px;color:var(--muted);margin:6px 0 20px;letter-spacing:1px;}
.g-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.g-cell{border-radius:6px;overflow:hidden;position:relative;cursor:pointer;
  background:#1a0508;}  /* fallback color so cell is visible even before img loads */
.g-cell:first-child{grid-column:1/3;grid-row:1/3;}
.g-cell img{width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .45s ease;min-height:100px;}
.g-cell:first-child{min-height:300px;}
.g-cell:not(:first-child){aspect-ratio:1;}
.g-cell:hover img{transform:scale(1.06);}
/* zoom badge — only on hover, NOT a dark overlay */
.g-badge{position:absolute;bottom:8px;right:8px;
  background:rgba(107,15,26,.75);border-radius:50%;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;}
.g-cell:hover .g-badge{opacity:1;}

/* ══════════════════════════════
   LIGHTBOX
══════════════════════════════ */
#lb{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.96);
  display:none;align-items:center;justify-content:center;}
#lb.on{display:flex;}
.lb-x{position:fixed;top:18px;right:22px;background:none;border:none;
  color:var(--rose);font-size:36px;cursor:pointer;line-height:1;z-index:8001;}
.lb-wrap{position:relative;max-width:880px;width:100%;padding:16px 56px;}
.lb-img{width:100%;max-height:82vh;object-fit:contain;border-radius:8px;
  display:block;transition:opacity .25s,transform .25s;}
.lb-img.fade{opacity:0;transform:scale(.96);}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(107,15,26,.6);border:1px solid var(--maroon2);
  color:var(--rose);width:40px;height:40px;border-radius:50%;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:background .2s;}
.lb-prev{left:8px;}.lb-next{right:8px;}
.lb-prev:hover,.lb-next:hover{background:var(--maroon);}
.lb-dots{display:flex;gap:7px;justify-content:center;margin-top:12px;}
.lb-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:background .2s;}
.lb-dot.on{background:var(--maroon3);}
.lb-cnt{font-size:11px;color:var(--muted);text-align:center;margin-top:6px;letter-spacing:2px;}
.lb-swipe{font-size:11px;color:rgba(255,255,255,.2);text-align:center;margin-top:4px;}

/* ══════════════════════════════
   LOCATION
══════════════════════════════ */
.s-loc{background:#0f0f0f;}
.loc-card{background:linear-gradient(135deg,#150508,#161616);border:1px solid var(--maroon);
  border-radius:11px;padding:22px;margin-bottom:12px;text-align:left;
  display:flex;gap:14px;align-items:flex-start;max-width:540px;
  margin-left:auto;margin-right:auto;transition:border-color .25s;position:relative;z-index:1;}
.loc-card:hover{border-color:var(--maroon3);}
.loc-ico{width:42px;height:42px;background:rgba(107,15,26,.3);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.loc-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--maroon3);margin-bottom:3px;}
.loc-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--white);}
.loc-addr{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.6;}
.loc-btn{display:inline-block;margin-top:10px;padding:7px 18px;border:1px solid var(--maroon2);
  border-radius:99px;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:var(--rose);text-decoration:none;transition:all .25s;}
.loc-btn:hover{background:var(--maroon);color:var(--white);}
.map-wrap{width:100%;max-width:540px;height:270px;border-radius:11px;overflow:hidden;
  border:1px solid var(--maroon);margin:20px auto;position:relative;z-index:1;}
.map-wrap iframe{width:100%;height:100%;border:none;filter:grayscale(40%) sepia(15%) hue-rotate(300deg);}

/* ══════════════════════════════
   RSVP
══════════════════════════════ */
.s-rsvp{background:linear-gradient(135deg,#0a0a0a,#150508,#0a0a0a);}
.rsvp-box{background:linear-gradient(135deg,#150508,#161616);border:1px solid var(--maroon);
  border-radius:14px;padding:36px 28px;margin:28px auto;max-width:540px;
  position:relative;overflow:hidden;z-index:1;}
.rsvp-box::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 100%,rgba(107,15,26,.28) 0%,transparent 60%);}
.rsvp-form{position:relative;display:flex;flex-direction:column;gap:14px;}
.r-inp{background:rgba(255,255,255,.04);border:1px solid rgba(139,26,42,.35);
  border-radius:8px;padding:12px 15px;color:var(--white);
  font-family:'Raleway',sans-serif;font-size:14px;font-weight:300;width:100%;
  transition:border-color .2s;}
.r-inp:focus{outline:none;border-color:var(--maroon3);}
.r-inp::placeholder{color:rgba(255,255,255,.22);}
.r-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.r-btn{background:linear-gradient(135deg,var(--maroon),var(--maroon2));border:none;
  border-radius:8px;padding:14px;font-family:'Raleway',sans-serif;font-size:12px;
  font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--white);
  cursor:pointer;transition:opacity .2s,transform .2s;}
.r-btn:hover{opacity:.88;transform:translateY(-1px);}
.r-ok{display:none;text-align:center;padding:22px;position:relative;}
.r-ok .big{font-family:'Playfair Display',serif;font-size:34px;color:var(--maroon3);font-style:italic;}
.r-ok p{color:rgba(255,255,255,.45);font-size:14px;margin-top:7px;}
.wishes{margin-top:28px;display:flex;flex-direction:column;gap:10px;
  text-align:left;max-width:540px;margin-left:auto;margin-right:auto;position:relative;z-index:1;}
.w-card{background:linear-gradient(135deg,#150508,#161616);border:1px solid rgba(139,26,42,.28);
  border-radius:9px;padding:16px 20px;animation:wIn .35s ease forwards;}
@keyframes wIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.w-auth{font-weight:500;color:var(--rose);margin-bottom:3px;font-size:14px;}
.w-att{font-size:11px;color:var(--maroon3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.w-txt{font-size:13px;color:var(--muted);line-height:1.7;font-style:italic;}

/* ══════════════════════════════
   CLOSING
══════════════════════════════ */
.s-closing{background:linear-gradient(155deg,#0a0a0a 0%,#1a0508 55%,#0a0a0a 100%);}
.s-closing::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(107,15,26,.22) 0%,transparent 65%);}
.cl-names{font-family:'Playfair Display',serif;font-size:clamp(38px,9vw,68px);
  color:var(--white);font-weight:400;position:relative;z-index:1;}
.cl-names em{color:var(--maroon3);font-style:italic;}
.cl-date{font-size:12px;letter-spacing:4px;color:var(--rose);margin-top:18px;position:relative;z-index:1;}
.cl-music{font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:1px;position:relative;z-index:1;}

/* ══════════════════════════════
   MUSIC BTN
══════════════════════════════ */
#mbtn{position:fixed;bottom:22px;right:22px;z-index:500;width:48px;height:48px;
  background:linear-gradient(135deg,var(--maroon),var(--maroon2));
  border-radius:50%;border:none;cursor:pointer;font-size:18px;
  box-shadow:0 4px 18px rgba(107,15,26,.55);
  display:flex;align-items:center;justify-content:center;transition:transform .2s;}
#mbtn:hover{transform:scale(1.1);}
#mbtn.play{animation:glow 2.5s ease infinite;}
@keyframes glow{0%,100%{box-shadow:0 4px 18px rgba(107,15,26,.55);}50%{box-shadow:0 4px 28px rgba(192,57,43,.85);}}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media(max-width:540px){
  .couple-grid{grid-template-columns:1fr;gap:24px;}.c-amp{display:none;}
  .cd-grid{grid-template-columns:repeat(2,1fr);}
  .g-grid{grid-template-columns:repeat(2,1fr);}
  .g-cell:first-child{grid-column:1/3;}
  .timeline::before{left:18px;}
  .tl{grid-template-columns:34px 1fr;}
  .tl:nth-child(odd) .tl-c,.tl:nth-child(even) .tl-c{text-align:left;grid-column:2;}
  .tl .tl-d{grid-column:1;}
  .r-row{grid-template-columns:1fr;}
  .lb-wrap{padding:16px 44px;}
}
</style>
</head>
<body>

<div id="pt"></div>
<button id="mbtn" onclick="toggleMusic()">🎵</button>

<!-- ══════ LIGHTBOX ══════ -->
<div id="lb">
  <button class="lb-x" onclick="closeLb()">×</button>
  <div class="lb-wrap">
    <img class="lb-img" id="lbImg" src="" alt="">
    <button class="lb-prev" onclick="lbMove(-1)">‹</button>
    <button class="lb-next" onclick="lbMove(1)">›</button>
  </div>
  <div style="position:absolute;bottom:24px;left:0;right:0;">
    <div class="lb-dots" id="lbDots"></div>
    <div class="lb-cnt" id="lbCnt"></div>
    <div class="lb-swipe">← gese
